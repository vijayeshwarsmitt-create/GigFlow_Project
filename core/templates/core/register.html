{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-6" style="background: linear-gradient(135deg, #FFF5F5 0%, #FFF9EC 60%, #F0F4FF 100%); min-height: calc(100vh - 64px);">
    <div class="w-full max-w-md">

        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="h-2 w-full" style="background: linear-gradient(90deg, #FF6B6B, #FFD166);"></div>

            <div class="p-8 md:p-10">
                <div class="text-center mb-8">
                    <img src="{% static 'core/gigflow_logo.png' %}" alt="GigFlow" class="w-14 h-14 rounded-2xl mx-auto mb-4 object-contain shadow-sm">
                    <h1 class="text-2xl font-black text-gray-900 mb-1">Create Account</h1>
                    <p class="text-sm text-gray-500">Join GigFlow and start your journey</p>
                </div>

                <form method="POST" action="{% url 'register' %}" class="space-y-4">
                    {% csrf_token %}

                    <div>
                        <label for="username" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Username</label>
                        <input type="text" id="username" name="username" required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-red-400 focus:ring-2 focus:ring-red-100 transition-all bg-gray-50 hover:bg-white"
                            placeholder="choose_a_username">
                    </div>

                    <div>
                        <label for="email" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Email</label>
                        <input type="email" id="email" name="email" required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-red-400 focus:ring-2 focus:ring-red-100 transition-all bg-gray-50 hover:bg-white"
                            placeholder="you@example.com">
                    </div>

                    <div>
                        <label for="user_type" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">I want to...</label>
                        <select id="user_type" name="user_type" required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-red-400 focus:ring-2 focus:ring-red-100 transition-all bg-gray-50 hover:bg-white">
                            <option value="WORKER">🧑‍💻 Find Digital Work (Freelancer)</option>
                            <option value="PROVIDER">🏢 Hire Digital Talent (Provider)</option>
                            <option value="CUSTOMER">🛍️ Buy Products / Book Services</option>
                            <option value="SELLER">📦 Sell Physical Products</option>
                            <option value="OFFLINE_PROVIDER">🛠️ Offer Local / Physical Services</option>
                        </select>

                        <!-- Live role description -->
                        <p id="role-desc" class="text-xs text-gray-400 mt-2 pl-1 italic"></p>
                    </div>

                    <div class="relative">
                        <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Password</label>
                        <div class="relative">
                            <input type="password" id="password" name="password" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-red-400 focus:ring-2 focus:ring-red-100 transition-all bg-gray-50 hover:bg-white"
                                placeholder="Create a strong password">
                            <button type="button" onclick="togglePassword('password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-3.5 text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5 text-sm mt-2" style="background: linear-gradient(135deg, #FF6B6B, #FFD166);">
                        Create My Account →
                    </button>
                </form>

                <p class="text-center mt-6 text-sm text-gray-500">
                    Already have an account? <a href="{% url 'login' %}" class="font-bold" style="color: #FF6B6B;">Sign in</a>
                </p>
            </div>
        </div>

    </div>
</div>

<script>
    const roleDescs = {
        'WORKER': 'Browse open gigs, apply for digital tasks, and get paid securely through escrow.',
        'PROVIDER': 'Post jobs, hire qualified freelancers, and manage project milestones.',
        'CUSTOMER': 'Shop the product store and book local offline services near you.',
        'SELLER': 'List and sell physical products to customers on the GigFlow marketplace.',
        'OFFLINE_PROVIDER': 'Offer your local skills like tutoring, repairs, or cleaning to nearby customers.',
    };
    const select = document.getElementById('user_type');
    const desc = document.getElementById('role-desc');
    function updateDesc() { desc.textContent = roleDescs[select.value] || ''; }
    select.addEventListener('change', updateDesc);
    updateDesc();

    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('svg');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.253 0 2.426.235 3.521.657m-.933 1.157A3 3 0 0010.125 12m0 0a3 3 0 00.375 3.125M21 21l-4.35-4.35m0 0l-4.35-4.35m4.35 4.35L21 21M3 3l3.35 3.35m0 0L12 12m0 0l3.35 1.5M12 12l4.35 4.35"></path>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        }
    }
</script>
{% endblock %}
