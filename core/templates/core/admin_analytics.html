{% extends 'core/base.html' %}

{% block content %}
<div class="flex-grow bg-[#0f172a] text-white p-6 md:p-12 transition-all duration-300 pb-24">
    <div class="max-w-7xl mx-auto space-y-8">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-200 to-gray-500">Platform Analytics</h1>
                <p class="text-gray-400 mt-2">Growth metrics and performance indicator graphs</p>
            </div>
            <a href="{% url 'admin_dashboard' %}" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors border border-gray-700 flex items-center shadow-md">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Dashboard
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- User Growth Chart -->
            <div class="glass-dark p-6 rounded-2xl border border-gray-800">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    User Type Registration Growth
                </h2>
                <div class="h-[350px]">
                    <canvas id="userGrowthChart"></canvas>
                </div>
            </div>

            <!-- Job Activity Chart -->
            <div class="glass-dark p-6 rounded-2xl border border-gray-800">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    Marketplace Activity (Jobs)
                </h2>
                <div class="h-[350px]">
                    <canvas id="jobActivityChart"></canvas>
                </div>
            </div>

            <!-- Revenue Chart -->
            <div class="glass-dark p-6 rounded-2xl border border-gray-800 lg:col-span-2">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Total Platform Transaction Volume ($)
                </h2>
                <div class="h-[400px]">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Fetch data
        fetch('{% url "admin_analytics_data" %}')
            .then(response => response.json())
            .then(data => {
                renderUserGrowthChart(data.user_growth);
                renderJobActivityChart(data.job_activity);
                renderRevenueChart(data.revenue);
            });

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                    ticks: { color: '#94a3b8' }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#94a3b8' }
                }
            },
            plugins: {
                legend: {
                    labels: { color: '#cbd5e1', font: { family: "'Inter', sans-serif" } }
                }
            }
        };

        function renderUserGrowthChart(userGrowth) {
            const months = [...new Set(userGrowth.map(item => new Date(item.month).toLocaleDateString(undefined, {month: 'short'})))];
            const types = ['CUSTOMER', 'SELLER', 'WORKER', 'PROVIDER', 'OFFLINE_PROVIDER'];
            const colors = {'CUSTOMER': '#3b82f6', 'SELLER': '#f97316', 'WORKER': '#a855f7', 'PROVIDER': '#10b981', 'OFFLINE_PROVIDER': '#64748b'};
            
            const datasets = types.map(type => {
                const typeData = months.map(m => {
                    const found = userGrowth.find(item => new Date(item.month).toLocaleDateString(undefined, {month: 'short'}) === m && item.user_type === type);
                    return found ? found.count : 0;
                });
                return {
                    label: type.replace('_', ' '),
                    data: typeData,
                    borderColor: colors[type],
                    backgroundColor: colors[type] + '20',
                    fill: true,
                    tension: 0.4
                };
            });

            new Chart(document.getElementById('userGrowthChart'), {
                type: 'line',
                data: { labels: months.length ? months : ['No Data'], datasets: datasets },
                options: commonOptions
            });
        }

        function renderJobActivityChart(jobActivity) {
            const months = [...new Set(jobActivity.map(item => new Date(item.month).toLocaleDateString(undefined, {month: 'short'})))];
            const statuses = ['OPEN', 'COMPLETED'];
            const colors = {'OPEN': '#3b82f6', 'COMPLETED': '#10b981'};

            const datasets = statuses.map(status => {
                const statusData = months.map(m => {
                    const found = jobActivity.find(item => new Date(item.month).toLocaleDateString(undefined, {month: 'short'}) === m && item.status === status);
                    return found ? found.count : 0;
                });
                return {
                    label: status,
                    data: statusData,
                    backgroundColor: colors[status],
                    borderRadius: 6
                };
            });

            new Chart(document.getElementById('jobActivityChart'), {
                type: 'bar',
                data: { labels: months.length ? months : ['No Data'], datasets: datasets },
                options: commonOptions
            });
        }

        function renderRevenueChart(revenue) {
            const labels = revenue.map(item => new Date(item.month).toLocaleDateString(undefined, {month: 'short'}));
            const values = revenue.map(item => item.total);

            new Chart(document.getElementById('revenueChart'), {
                type: 'line',
                data: {
                    labels: labels.length ? labels : ['No Data'],
                    datasets: [{
                        label: 'Total Revenue ($)',
                        data: values,
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: commonOptions
            });
        }
    });
</script>

<style>
    body { background-color: #0f172a !important; }
    .glass-dark {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }
</style>
{% endblock %}
