{% extends 'core/base.html' %}

{% block content %}
<div class="flex-grow bg-[#0f172a] text-white p-6 md:p-12 flex items-center justify-center min-h-[80vh]">
    <div class="max-w-md w-full glass-dark p-8 rounded-3xl border border-gray-800 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-blue-500/30">
                <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold">Redeem Admin Passkey</h1>
            <p class="text-gray-400 mt-2">Enter your token to activate Admin permissions</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 block">Cryptographic Passkey</label>
                <input type="text" name="token" value="{{ token|default:'' }}" required placeholder="00000000-0000-0000-0000-000000000000" class="w-full bg-gray-900/50 border border-gray-700 rounded-xl px-4 py-4 text-white font-mono text-center focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all transform active:scale-95">
                Redeem & Promote Account
            </button>
        </form>

        <p class="text-xs text-center text-gray-600 mt-8">
            Each passkey can only be used once. If you don't have a key, contact your branch supervisor.
        </p>
    </div>
</div>

<style>
    body { background-color: #0f172a !important; }
    .glass-dark {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }
</style>
{% endblock %}
